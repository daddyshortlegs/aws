- name: Restart vm-launcher on all workers
  become: yes
  hosts: workers
  tasks:
    - name: Restart vm-launcher service
      ansible.builtin.systemd:
        name: vm-launcher
        state: restarted

    - name: Restart frontend service
      ansible.builtin.systemd:
        name: frontend
        state: restarted

    - name: Restart node-ssh service
      ansible.builtin.systemd:
        name: node-ssh
        state: restarted

- name: Restart proxy on controller
  become: yes
  hosts: controller
  tasks:
    - name: Restart proxy service
      ansible.builtin.systemd:
        name: proxy
        state: restarted
